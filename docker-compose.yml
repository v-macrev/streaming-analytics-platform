version: "3.9"

name: streaming-analytics-platform

services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: sap-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - streaming_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sap-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-kraft"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: "PLAINTEXT"
    networks:
      - streaming_net

  spark-master:
    image: apache/spark:3.5.2-scala2.12-java17-python3-ubuntu
    container_name: sap-spark-master
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./streaming:/opt/app/streaming
    networks:
      - streaming_net

  spark-worker:
    image: apache/spark:3.5.2-scala2.12-java17-python3-ubuntu
    container_name: sap-spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "2G"
    volumes:
      - ./streaming:/opt/app/streaming
    networks:
      - streaming_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: sap-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "analytics_user"
      CLICKHOUSE_PASSWORD: "analytics_pass"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user analytics_user --password analytics_pass --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - streaming_net

  grafana:
    build:
      context: ./infra/grafana
      dockerfile: Dockerfile
    container_name: sap-grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards/json
    networks:
      - streaming_net

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: sap-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: "docker"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC_EVENTS: "events.raw"
      PRODUCER_EVENT_INTERVAL_MS: "500"
      PRODUCER_SOURCE_NAME: "web-simulator"
    volumes:
      - ./producer:/opt/app/producer
    working_dir: /opt/app/producer
    command: ["python", "src/main.py"]
    restart: unless-stopped
    networks:
      - streaming_net
    profiles:
      - app

  streaming-job:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: sap-streaming-job
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      APP_ENV: "docker"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC_EVENTS: "events.raw"
      SPARK_MASTER_URL: "spark://spark-master:7077"
      CLICKHOUSE_HOST: "clickhouse"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: "analytics"
      CLICKHOUSE_USER: "analytics_user"
      CLICKHOUSE_PASSWORD: "analytics_pass"
      SPARK_LOCAL_DIRS: "/tmp/spark-local"
      HOME: "/tmp"
      IVY_HOME: "/tmp/.ivy2"
    volumes:
      - ./streaming:/opt/app/streaming
    working_dir: /opt/app/streaming
    command:
      [
        "spark-submit",
        "--master",
        "spark://spark-master:7077",
        "--conf",
        "spark.jars.ivy=/tmp/.ivy2",
        "--packages",
        "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.2",
        "src/main.py"
      ]
    restart: unless-stopped
    networks:
      - streaming_net
    profiles:
      - app

networks:
  streaming_net:
    driver: bridge

volumes:
  kafka_data:
  clickhouse_data:
  grafana_data: