version: "3.9"

name: streaming-analytics-platform

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: sap-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "24"
      KAFKA_CFG_LOG_SEGMENT_BYTES: "1073741824"
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_KRAFT_CLUSTER_ID: "abcdefghijklmnopqrstuv"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - streaming_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sap-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-kraft"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: "PLAINTEXT"
    networks:
      - streaming_net

  spark-master:
    image: bitnami/spark:3.5
    container_name: sap-spark-master
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPARK_MODE: "master"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./streaming:/opt/app/streaming
    networks:
      - streaming_net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: sap-spark-worker
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_MODE: "worker"
      SPARK_MASTER_URL: "spark://spark-master:7077"
      SPARK_WORKER_MEMORY: "2G"
      SPARK_WORKER_CORES: "2"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    volumes:
      - ./streaming:/opt/app/streaming
    networks:
      - streaming_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: sap-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "analytics_user"
      CLICKHOUSE_PASSWORD: "analytics_pass"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user analytics_user --password analytics_pass --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - streaming_net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: sap-grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - streaming_net

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: sap-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: "docker"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC_EVENTS: "events.raw"
      PRODUCER_EVENT_INTERVAL_MS: "500"
      PRODUCER_SOURCE_NAME: "web-simulator"
    volumes:
      - ./producer:/opt/app/producer
    working_dir: /opt/app/producer
    command: ["python", "src/main.py"]
    restart: unless-stopped
    networks:
      - streaming_net
    profiles:
      - app

  streaming-job:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: sap-streaming-job
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      APP_ENV: "docker"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC_EVENTS: "events.raw"
      SPARK_MASTER_URL: "spark://spark-master:7077"
      CLICKHOUSE_HOST: "clickhouse"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: "analytics"
      CLICKHOUSE_USER: "analytics_user"
      CLICKHOUSE_PASSWORD: "analytics_pass"
    volumes:
      - ./streaming:/opt/app/streaming
    working_dir: /opt/app/streaming
    command: ["python", "src/main.py"]
    restart: unless-stopped
    networks:
      - streaming_net
    profiles:
      - app

networks:
  streaming_net:
    driver: bridge

volumes:
  kafka_data:
  clickhouse_data:
  grafana_data: